<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QualyPath Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="widget.css" />
  </head>
  <body>
    <div id="qp-widget-root">
      <!-- Welcome (default start page) -->
      <div id="qp-welcome" class="qp-panel qp-shell qp-hidden" aria-hidden="true">
        <header class="qp-shell-header">
          <div class="qp-shell-header-left">
            <div class="qp-shell-logo" aria-hidden="true">
              <svg viewBox="0 0 48 48" width="32" height="32">
                <path
                  d="M24 8l14 8v10c0 7.5-6 13.5-14 16-8-2.5-14-8.5-14-16V16l14-8z"
                  fill="#2563eb"
                />
                <path
                  d="M18 24l4 4 8-9"
                  stroke="#fff"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  fill="none"
                />
              </svg>
            </div>
            <div class="qp-shell-title">
              <strong>QualyPath Assistant</strong>
              <span>Enforcement cases</span>
            </div>
          </div>
          <div class="qp-shell-actions">
            <button type="button" class="qp-header-btn" id="qp-welcome-history" aria-label="History" title="History">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="9" />
                <path d="M12 7v5l3 2" />
              </svg>
            </button>
            <button type="button" class="qp-header-btn" id="qp-welcome-close" aria-label="Close">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 6L6 18M6 6l12 12" />
              </svg>
            </button>
          </div>
        </header>
        <div class="qp-welcome-body qp-shell-body">
          <div class="qp-welcome-hero">
            <div class="qp-welcome-icon-wrap">
              <svg viewBox="0 0 48 48" width="56" height="56" aria-hidden="true">
                <path
                  d="M24 8l14 8v10c0 7.5-6 13.5-14 16-8-2.5-14-8.5-14-16V16l14-8z"
                  fill="#2563eb"
                />
                <path
                  d="M18 24l4 4 8-9"
                  stroke="#fff"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  fill="none"
                />
              </svg>
            </div>
            <h2 class="qp-welcome-heading">Welcome back</h2>
            <p class="qp-welcome-text">
              I can search enforcement cases, summarize details, and help you open records in QualyPath.
            </p>
            <div class="qp-feature-chips">
              <span class="qp-chip">Case lookup</span>
              <span class="qp-chip">Impacted person</span>
              <span class="qp-chip">Referrals</span>
            </div>
          </div>
          <div class="qp-quick-actions">
            <button type="button" class="qp-quick-btn qp-quick-btn-primary" id="qp-btn-yes">
              Start chatting
            </button>
            <button type="button" class="qp-quick-btn qp-quick-btn-ghost" id="qp-btn-history">
              View history
            </button>
          </div>
        </div>
      </div>

      <!-- History -->
      <div id="qp-history" class="qp-panel qp-shell qp-hidden" aria-hidden="true">
        <header class="qp-shell-header">
          <div class="qp-shell-header-left">
            <button type="button" class="qp-header-btn qp-header-back" id="qp-history-back" aria-label="Back">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M15 18l-6-6 6-6" />
              </svg>
            </button>
            <div class="qp-shell-title">
              <strong>History</strong>
              <span>Your conversations</span>
            </div>
          </div>
          <div class="qp-shell-actions">
            <button type="button" class="qp-header-btn" id="qp-history-new" aria-label="New chat" title="New chat">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 5v14M5 12h14" />
              </svg>
            </button>
            <button type="button" class="qp-header-btn" id="qp-history-close" aria-label="Close">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 6L6 18M6 6l12 12" />
              </svg>
            </button>
          </div>
        </header>
        <div class="qp-shell-body qp-history-body">
          <div class="qp-history-list" id="qp-history-list"></div>
        </div>
      </div>

      <!-- Chat -->
      <div id="qp-chat" class="qp-panel qp-shell qp-hidden" aria-hidden="true">
        <header class="qp-shell-header">
          <div class="qp-shell-header-left">
            <button type="button" class="qp-header-btn qp-header-back" id="qp-chat-back" aria-label="Back">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M15 18l-6-6 6-6" />
              </svg>
            </button>
            <div class="qp-shell-logo qp-shell-logo-sm" aria-hidden="true">
              <svg viewBox="0 0 48 48" width="28" height="28">
                <path
                  d="M24 8l14 8v10c0 7.5-6 13.5-14 16-8-2.5-14-8.5-14-16V16l14-8z"
                  fill="#2563eb"
                />
                <path
                  d="M18 24l4 4 8-9"
                  stroke="#fff"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  fill="none"
                />
              </svg>
            </div>
            <div class="qp-shell-title">
              <strong>QualyPath Assistant</strong>
              <span>Enforcement cases</span>
            </div>
          </div>
          <div class="qp-shell-actions">
            <button type="button" class="qp-header-btn" id="qp-chat-new" aria-label="New chat" title="New chat">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 5v14M5 12h14" />
              </svg>
            </button>
            <button type="button" class="qp-header-btn" id="qp-chat-history" aria-label="History" title="History">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="9" />
                <path d="M12 7v5l3 2" />
              </svg>
            </button>
            <button type="button" class="qp-header-btn" id="qp-chat-close" aria-label="Close">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 6L6 18M6 6l12 12" />
              </svg>
            </button>
          </div>
        </header>
        <div class="qp-messages qp-shell-body" id="qp-messages"></div>
        <div class="qp-suggestions" id="qp-suggestions"></div>
        <div class="qp-input-area">
          <div class="qp-input-row">
            <textarea
              id="qp-input"
              rows="1"
              placeholder="Ask about a case by ID or number..."
            ></textarea>
            <button type="button" class="qp-send" id="qp-send" aria-label="Send message" disabled>
              <svg class="qp-send-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true">
                <path d="M12 19V5M5 12l7-7 7 7" />
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Launcher FAB -->
      <div class="qp-launcher-wrap">
        <button type="button" class="qp-launcher" id="qp-launcher" aria-label="Open QualyPath AI assistant">
          <span class="qp-launcher-icon qp-launcher-open" id="qp-icon-open">
            <svg viewBox="0 0 32 32" width="28" height="28" aria-hidden="true">
              <path
                d="M16 3l10 5.5v7c0 6.2-4.5 11.2-10 13.5C10.5 26.7 6 21.7 6 15.5v-7L16 3z"
                fill="#fff"
              />
              <circle cx="12" cy="14" r="1.5" fill="#2563eb" />
              <circle cx="16" cy="14" r="1.5" fill="#2563eb" />
              <circle cx="20" cy="14" r="1.5" fill="#2563eb" />
            </svg>
          </span>
          <span class="qp-launcher-icon qp-launcher-close qp-hidden" id="qp-icon-close">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M18 6L6 18M6 6l12 12" />
            </svg>
          </span>
        </button>
        <span class="qp-launcher-tooltip" id="qp-tooltip">Ask QualyPath AI</span>
      </div>
    </div>
    <script src="widget.js"></script>
  </body>
</html>
